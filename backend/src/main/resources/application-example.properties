spring.application.name=quiz

# ─── Database ────────────────────────────────────────────────────────────────
# Supply DB_PASSWORD via environment variable in production.
# Replace values with your own database configuration.
spring.datasource.url=jdbc:mysql://localhost:3306/your_database_name
spring.datasource.username=your_username
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── JWT ─────────────────────────────────────────────────────────────────────
# IMPORTANT: Provide a strong random Base64 string for production.
# Must be >= 256 bits (32 bytes) for HS256.
app.jwt.secret=YOUR_BASE64_SECRET_KEY_HERE
# Token expiry in milliseconds: 86400000 = 24 hours
app.jwt.expiration=86400000
